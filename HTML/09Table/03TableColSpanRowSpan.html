<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>

<body>
    <h1>Table Colspan and Rowspan</h1>
    <hr>
    <!-- table -> Table Tag is used to create table in Html  -->
    <!-- thead -> Table Header -->
    <!-- tbody -> Table Body -->
    <!-- tfoot -> Table Footer -->
    <!-- th -> Table Heading -->
    <!-- td -> Table Data -->
    <!-- tr -> Table Row -->
     <!-- <center>
        <h2>Table Colspan and Rowspan</h2>
     </center> -->
    <table border="1">

        <tr>
            <th colspan="2">Table Data</th>
            <th colspan="2">Table Data</th>
        </tr>
        <tr>
            <td rowspan="5">Table Data</td>
            <td>Table Data</td>
            <td>Table Data</td>
            <td rowspan="5">Table Data</td>
        </tr>
        <tr>
            <td>Table Data</td>
            <td>Table Data</td>
        </tr>
        <tr>
            <td>Table Data</td>
            <td>Table Data</td>
        </tr>
        <tr>
            <td>Table Data</td>
            <td>Table Data</td>
        </tr>
        <tr>
            <th colspan="2">Table Data</td>
        </tr>

    </table>
</body>

</html>
