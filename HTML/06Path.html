<body>
    <h1>Path In HTML</h1>
    <p>Path is the location of a file or folder in a computer system. In HTML, we use path to link files like images,
        CSS, and JavaScript files.</p>
    <p>There are two types of paths in HTML:</p>
    <ul>
        <li>Absolute Path</li>
        <img src="C:\Users\Chetan Sharma\Desktop\ASDC\FSD_01\Images\bannere.jpg">
        <li>Relative Path</li>
        <img src="../Images/bannere.jpg">
    </ul>
