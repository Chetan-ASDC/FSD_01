<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heading Para</title>
</head>
<body>
    <!-- heading => h1 to h6 -->
    <!-- h1 is most imprtant and h6 is least important. It is used to define the headings of a webpage. The numbers (1-6) indicate the level of importance, with h1 being the most important and h6 being the least important. Headings are typically displayed in a larger and bolder font than regular text to make them stand out and indicate the structure of the content on the webpage. -->
     <!-- Always use h1 only one time in a webpage. It is used to define the main heading of the webpage, which represents the primary topic or purpose of the page. Using h1 only once helps search engines and users understand the main focus of the content and improves accessibility for screen readers. It also ensures a clear hierarchy of headings, making it easier for users to navigate and comprehend the structure of the webpage. -->
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>
    <hr>

    <p>This is a Paragraph.</p>
    <p>This is another Paragraph.</p>
    <p>This is an Example Paragraph. <br>
    This is an Example Paragraph.<br>
    This is an Example Paragraph.<br>
    This is an Example Paragraph.<br>
    This is an Example Paragraph.</p>
</body>
</html>
