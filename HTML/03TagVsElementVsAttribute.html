<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Vs Element Vs Attribute</title>
</head>
<body>
    <h2>Tag</h2>
    <p>Which Comes in Angular Brackets.</p>
    <p>We have Two Types of Tags.</p>
    <ul>
        <li>Pair Tag (Start Tags and End Tags)</li>
        <li>Self Closing Tag</li>
    </ul>
        
    <h2>Element</h2>
    <p>Element is a Combination of Start Tag, End Tag and Content.</p>
    <hr>
    <h2>Attribute</h2>
    <p>Attribute is a Property of an Element.</p>
    <p>It is always written in Start Tag.</p>

</body>
</html>
