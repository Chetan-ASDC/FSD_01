<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Form Input Elements</h1>
    <hr>
    <fieldset>
        <legend>Form Input Elements</legend>
        <input type="text" name="username" placeholder="Enter your name" />
        <br>
        <br>
        <input type="password" name="password" placeholder="Enter your password" />
        <br>
        <br>
        <input type="email" name="email" placeholder="Enter your email" />
        <br>
        <br>
        <input type="number" name="age" placeholder="Enter your age" />
        <br>
        <br>
        <input type="date" name="dob" placeholder="Enter your date of birth" />
        <br>
        <br>
        <input type="file" name="profile_picture" />
        <br>
        <br>
        <input type="tel" name="phone" placeholder="Enter your phone number" />
        <br>
        <br>
        <input type="url" name="website" placeholder="Enter your website URL" />
        <br>
        <br>
        <input type="image" name="image" src="image.jpg" alt="Image" />
        <br>
        <br>
        <input type="hidden" name="hidden_field" value="hidden_value" />
        <br>
        <br>
        <input type="range" name="rating" min="1" max="10" />
        <br>
        <br>
        <input type="color" name="favorite_color" />
        <br>
        <br>
        <input type="reset" value="Reset Form" />
        <br>
        <br>
        <input type="submit" value="Submit Form" />
        <br>
        <br>
        <input type="datetime" name="appointment" placeholder="Enter your appointment date and time" />
        <br>
        <br>
        <input type="month" name="birth_month" placeholder="Enter your birth month" />
        <br>
        <br>
        <input type="week" name="birth_week" placeholder="Enter your birth week" />
        <br>
        <br>
        <input type="search" name="search_query" placeholder="Search..." />
        <br>
        <br>
        <input type="time" name="meeting_time" placeholder="Enter your meeting time" />
        <br>
        <br>
        <input type="datetime-local" name="local_datetime" placeholder="Enter your local date and time" />
        <br>
        <br>
        <input type="button" value="Click Me" />
        <br>
        <br>

    </fieldset>
    <hr>
    <fieldset>
        <legend>Form Input Check Box Radio Button</legend>
        <label for="gender">Gender</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br>
        <br>
        <br>
        <label for="hobbies">Hobbies</label>
        <input type="checkbox" id="reading" name="hobbies" value="reading">
        <label for="reading">Reading</label>
        <input type="checkbox" id="traveling" name="hobbies" value="traveling">
        <label for="traveling">Traveling</label>
        <input type="checkbox" id="cooking" name="hobbies" value="cooking">
        <label for="cooking">Cooking</label>
        <input type="checkbox" id="sports" name="hobbies" value="sports">
        <label for="sports">Sports</label>
        <br>
        <br>
        <textarea cols="40" rows="10" placeholder="Enter your message here..."></textarea>
        
    </fieldset>
    <br>
    <br>
    <select>
        <label for="hobby">Hobby</label>
        <option value="reading">Reading</option>
        <option value="traveling">Traveling</option>
        <option value="cooking">Cooking</option>
    </select>

</body>

</html>
